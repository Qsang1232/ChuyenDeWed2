  # 2. Tạo App Password: Google Account → Security → App Passwords
  # 3. Set biến môi trường: MAIL_USERNAME=your@gmail.com MAIL_PASSWORD=xxxx-xxxx-xxxx-xxxx
  # Nếu không cấu hình, hệ thống sẽ chạy DEV MODE (in link reset ra console)
